services:
  manufex-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manufex-backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "5000"
    networks:
      - manufex-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  manufex-nginx:
    image: nginx:alpine
    container_name: manufex-nginx
    restart: unless-stopped
    ports:
      - "8022:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - manufex-backend
    networks:
      - manufex-net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.2"

networks:
  manufex-net:
    driver: bridge
